services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./moodle:/var/www/html
      - ./moodledata:/var/www/moodledata
    environment:
      - MOODLE_DATA=/var/www/moodledata
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=moodle
      - MYSQL_USER=moodle
      - MYSQL_PASSWORD=moodle
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7

volumes:
  db_data:
